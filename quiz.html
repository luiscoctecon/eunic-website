<!DOCTYPE html>
<html lang="en">
<head>
   \

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Discovery & Transformation Test ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="quiz.css">
</head>
<body class="bg-black from-purple-50 to-yellow-50 min-h-screen">
    <div class="container mx-auto px-4 py-8 max-w-3xl">
        <h1 class="text-4xl font-bold text-center mb-8 text-gradient">✨ Self-Discovery & Transformation Test ✨</h1>
        
        <form id="quizForm" class="space-y-8">
            <!-- Questions will be dynamically inserted here -->
            <div id="questionsContainer"></div>

            <!-- Contact Information -->
            <div class="bg-white rounded-lg shadow-lg p-6 space-y-4 animate-fade-in hidden" id="contactSection">
                <h3 class="text-xl font-semibold mb-4">Please share your contact info to receive your results:</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" id="fullName" name="fullName" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-yellow-500 focus:ring-yellow-500">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700">WhatsApp</label>
                        <input type="tel" id="phone" name="phone" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-yellow-500 focus:ring-yellow-500">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Email</label>
                        <input type="email" id="email" name="email" required
                            class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-yellow-500 focus:ring-yellow-500">
                    </div>
                </div>
            </div>

            <div class="flex justify-center space-x-4">
                <button type="button" id="prevBtn" class="hidden px-6 py-2 bg-white text-black rounded-full hover:bg-gray-600 transition-colors">
                    Previous
                </button>
                <button type="button" id="nextBtn" class="px-6 py-2 background-button text-white rounded-full hover:bg-black hover:text-white transition-colors">
                    Next
                </button>
                <button type="submit" id="submitBtn" class="hidden px-6 py-2 bg-yellow-500 text-white rounded-full hover:bg-yellow-600 transition-colors">
                    Get My Results
                </button>
            </div>
        </form>

        <!-- Progress bar -->
        <div class="mt-8">
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progressBar" class="background-button h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <p id="progressText" class="text-center mt-2 text-sm text-gray-100">Question 1 of 7</p>
        </div>
    </div>

    <script src="quiz.js"></script>
</body>
</html>
