<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Workshop Sign Up - Eunice Inside Glow</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Tinos:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
   <script src="https://cdn.tailwindcss.com"></script> 
    <link rel="stylesheet" href="style.css">
     <!--SEO Meta Tags-->
    
    <style>
        .workshop-form {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="bg-[#c6b4a1] min-h-screen">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 shadow-sm">
        <div class="container  mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-[#492e21] text-xl font-semibold">Eunice Inside Glow</a>
                <a href="index.html" class="text-[#492e21] hover:text-[#6b4a3a]">
                    <i class="fas fa-home text-[#492e21]"></i> Home
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container bg-[#c6b4a1] mx-auto px-4 pt-24 pb-16">
        <div class="max-w-2xl mx-auto">
            <!-- Header -->
            <div class="text-center mb-12">
                <h1 class="text-4xl md:text-5xl font-bold mb-4 text-[#492e21]">Let's Work Together</h1>
                <p class="text-[#492e21] text-lg mb-6"> Inside Glow Community </p>
                <div class="flex flex-wrap justify-center gap-4 mb-8">
                    <div class="flex items-center text-[#492e21]">
                       Inside Glow Community is a 12-week Identity Reset for entrepreneurial Women


                    </div>
                </div>
            </div>

            <!-- Sign Up Form -->
             
<div class="workshop-form rounded-lg p-8 mb-8">
                
<form class="space-y-6" action="https://api.web3forms.com/submit" method="POST">
 <input type="hidden" name="access_key" value="812ad935-9c03-4aba-817c-a5f9253d662a">  

<label class="block text-black mb-2">Full Name</label>
<input type="text" name="name" required
 class="w-full px-4 py-2 rounded-md bg-white text-[#492e21] border border-gray-500 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500">

<label class="block text-black mb-2">WhatsApp Number</label>
<input type="tel" id="whatsapp" name="whatsapp" required
 class="w-full px-4 py-2 rounded-md bg-white text-[#492e21] border border-gray-500 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500"
 placeholder="+1 (123) 456-7890">
                    
                    
                    
<label class="block text-black mb-2">Email Address</label>
<input type="email" name="email" required
 class="w-full px-4 py-2 rounded-md bg-white text-[#492e21] border border-gray-500 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500">

<label class="block text-black mb-2">Interested In:</label>
<select name="interested_in" id="interested_in" required
 class="w-full px-4 py-2 rounded-md bg-white text-[#492e21] border border-gray-500 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500">
    
    <option value="1:1 Consulting">Community</option>
   
</select>

<div id="other-description" class="hidden mt-4">
    <label class="block text-black mb-2">Please describe:</label>
    <textarea name="other_description"
     class="w-full px-4 py-2 rounded-md bg-white text-[#492e21] border border-gray-500 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-500"
     placeholder="Please describe what you're interested in..."
     rows="3"></textarea>
</div>

<script>
    document.getElementById('interested_in').addEventListener('change', function() {
        const otherDiv = document.getElementById('other-description');
        if (this.value === 'Other') {
            otherDiv.classList.remove('hidden');
        } else {
            otherDiv.classList.add('hidden');
        }
    });
</script>

<input type="checkbox" name="botcheck" class="hidden" style="display: none;">
<input type="hidden" name="redirect" value="thank-you.html"/>
 <button type="submit"
class="w-full py-3 px-6 text-center text-white rounded-md bg-[#492e21] hover:bg-[#6b4a3a] transition-all duration-300 transform hover:scale-105">
    Submit
  </button>
     
     </form>
 </div>
            

   

           
            </div>
        </div>
    </div>

    
</body>

</html>
