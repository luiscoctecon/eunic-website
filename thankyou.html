<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You for Booking - Eunice Glow Events</title>
  <link rel="stylesheet" href="./style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
    }
    .thankyou-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(120deg, #010101 80%, #f7464622 100%);
    }
    .thankyou-card {
      background: linear-gradient(135deg, #181818 80%, #ffb34722 100%);
      border-radius: 1.5rem;
      border: 1px solid #ffb34744;
      box-shadow: 0 8px 32px #ffb34755;
      padding: 3rem 2.5rem;
      max-width: 420px;
      text-align: center;
    }
    .thankyou-title {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(90deg, #d8d5d0, #ded8d6, #aca78b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
    }
    .thankyou-message {
      color: #fff7c2;
      font-size: 1.15rem;
      margin-bottom: 2.2rem;
      font-weight: 500;
    }
    .event-address {
      color: #c59e00;
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 2.2rem;
    }
     p {
        margin: 0.3rem 0;
        color: #fff7c2;
    }
    .back-btn {
      background: linear-gradient(90deg, #595448, #847f5a);
      color: #fff;
      border: none;
      border-radius: 2rem;
      padding: 0.6rem 1.5rem;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 2px 8px #ffb34744;
      transition: box-shadow 0.2s, filter 0.2s;
      filter: brightness(1);
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:hover {
      box-shadow: 0 4px 16px #ffb34744;
      filter: brightness(1.15) drop-shadow(0 0 8px #ffb34744);
      color: #fff7c2;
    }
  </style>
</head>
<body>
  <div class="thankyou-container">
    <div class="thankyou-card">
      <div class="thankyou-title">Thank You for Booking!</div>
      <div class="thankyou-message">
        To check in to the event, please use the name you used to complete the transaction.
      </div>
      <div class="event-address">
        <a href="https://www.google.com/maps/search/?api=1&query=Carrer+Roger+de+Lluria+46,,+Barcelona" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;">
          <i class="fas fa-map-marker-alt"></i> Carrer Roger de Lluria 46, Principal 1a, Barcelona
        </a>
        <br>
         <p>We'll email you shortly  with more information shortly </p>
      </div>
      <a href="events.html" class="back-btn">Back to Events</a>
      
    </div>
   
  </div>
  <script src="https://kit.fontawesome.com/2b8e1e2e5a.js" crossorigin="anonymous"></script>
</body>
</html>
